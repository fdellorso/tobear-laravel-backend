name: Deploy Backend on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Install dependencies (with dev)
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare test environment
        run: |
          php -r "file_put_contents('.env', 'APP_KEY=' . trim(shell_exec('php artisan key:generate --show')) . PHP_EOL);"
          echo "CONTACT_NOTIFICATION_EMAIL=test@example.com" >> .env

      - name: Check code style
        run: ./vendor/bin/pint --test

      - name: Run tests
        run: php artisan test

      - name: Install production dependencies
        run: composer install --prefer-dist --no-progress --optimize-autoloader --no-dev --no-interaction

      - name: Copy .env.production to .env
        run: cp .env.production.x10 .env

      - name: Inject DB credentials
        run: |
          sed -i "s|DB_HOST=.*|DB_HOST=${{ secrets.DB_HOST_X10 }}|" .env
          sed -i "s|DB_DATABASE=.*|DB_DATABASE=${{ secrets.DB_DATABASE_X10 }}|" .env
          sed -i "s|DB_USERNAME=.*|DB_USERNAME=${{ secrets.DB_USERNAME_X10 }}|" .env
          sed -i "s|DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.DB_PASSWORD_X10 }}|" .env

      - name: Inject MAIL credentials
        run: |
          sed -i "s|MAIL_HOST=.*|MAIL_HOST=${{ secrets.MAIL_HOST_X10 }}|" .env
          sed -i "s|MAIL_USERNAME=.*|MAIL_USERNAME=${{ secrets.MAIL_USERNAME_X10 }}|" .env
          sed -i "s|MAIL_PASSWORD=.*|MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD_X10 }}|" .env
          sed -i "s|MAIL_FROM_ADDRESS=.*|MAIL_FROM_ADDRESS=\"${{ secrets.MAIL_FROM_ADDRESS_X10 }}\"|" .env

      - name: Inject APP_KEY from secret
        run: sed -i "s|^APP_KEY=$|APP_KEY=${{ secrets.APP_KEY }}|" .env

      - name: Inject ARTISAN_DEBUG_TOKEN from secret
        run: sed -i "s|^ARTISAN_DEBUG_TOKEN=$|ARTISAN_DEBUG_TOKEN=${{ secrets.ARTISAN_DEBUG_TOKEN }}|" .env

      - name: Inject CONTACT_NOTIFICATION_EMAIL from secret
        run: sed -i "s|^CONTACT_NOTIFICATION_EMAIL=$|CONTACT_NOTIFICATION_EMAIL=${{ secrets.CONTACT_NOTIFICATION_EMAIL }}|" .env

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_FOLDER }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**

      - name: Deploy summary
        run: |
          echo "### ✅ Backend deploy completato" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Autore**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ora**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
